<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Gastos - Iniciar Sesión</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="card">
      <h1 style="text-align: center; margin-bottom: 20px; color: #202b36;">Control de Gastos</h1>
      
      <div class="auth-tabs">
        <button id="tab-login" class="auth-tab active" onclick="mostrarFormularioAuth('login')">Iniciar Sesión</button>
        <button id="tab-register" class="auth-tab" onclick="mostrarFormularioAuth('register')">Registrarse</button>
      </div>

      <!-- Formulario Login -->
      <form id="form-login">
        <div class="form-group">
          <label for="login-email">Correo Electrónico:</label>
          <input type="email" id="login-email" placeholder="tu@correo.com" required>
        </div>
        <div class="form-group">
          <label for="login-password">Contraseña:</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-submit">Ingresar</button>
      </form>

      <!-- Formulario Registro -->
      <form id="form-register" class="hidden">
        <div class="form-group">
          <label for="reg-nombre">Nombre Completo:</label>
          <input type="text" id="reg-nombre" placeholder="Ej: Diego" required>
        </div>
        <div class="form-group">
          <label for="reg-email">Correo Electrónico:</label>
          <input type="email" id="reg-email" placeholder="tu@correo.com" required>
        </div>
        <div class="form-group">
          <label for="reg-password">Contraseña:</label>
          <input type="password" id="reg-password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-submit">Crear Cuenta</button>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
