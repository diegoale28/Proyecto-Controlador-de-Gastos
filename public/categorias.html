<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control de Gastos - Categorías</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    
    <header>
      <h1>Control de Gastos</h1>
      <div id="user-info">
        <span id="user-display"></span>
        <button onclick="cerrarSesion()" class="btn-logout">Cerrar Sesión</button>
      </div>
    </header>

    <nav class="tabs">
      <a href="index.html" class="tab-btn"> Movimientos</a>
      <a href="categorias.html" class="tab-btn active"> Categorías</a>
      <a href="cuentas.html" class="tab-btn"> Cuentas / Bancos</a>
      <a href="estadisticas.html" class="tab-btn"> Estadísticas</a>
    </nav>

    <!-- Formulario Categoría -->
    <section class="card">
      <h2>Nueva Categoría Personalizada</h2>
      <form id="form-categoria">
        <div class="form-row">
          <div class="form-group">
            <label for="cat-nombre">Nombre de Categoría:</label>
            <input type="text" id="cat-nombre" placeholder="Ej: Mascotas, Gimnasio" required>
          </div>
          <div class="form-group">
            <label for="cat-tipo">Tipo:</label>
            <select id="cat-tipo" required>
              <option value="egreso">Egreso</option>
              <option value="ingreso">Ingreso</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn-submit">Guardar Categoría</button>
      </form>
    </section>

    <!-- Tabla Categorías -->
    <section class="card">
      <h2>Mis Categorías</h2>
      <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Tipo</th>
            <th>Origen</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="tabla-categorias-body">
          <!-- Carga dinámicamente -->
        </tbody>
      </table>
      </div>
    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
